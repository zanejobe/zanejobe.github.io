    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://www.linkedin.com/in/zane-jobe/"

footer:
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:zanejobe@mines.edu"
    - label: "Google Scholar"
      icon: "fab fa-google"

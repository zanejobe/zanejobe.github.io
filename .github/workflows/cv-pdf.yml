name: Generate CV PDF

on:
  push:
    paths:
      - "_pages/cv.md"
      - ".github/workflows/cv-pdf.yml"

permissions:
  contents: write

jobs:
  build-pdf:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pandoc
        uses: pandoc/actions/setup@v1

      - name: Install TeX
        run: sudo apt-get update && sudo apt-get install -y texlive-xetex

      - name: Create files directory
        run: mkdir -p files

      - name: Build PDF from CV markdown
        run: |
          pandoc "_pages/cv.md" \
            -o "files/Zane_Jobe_CV_2026.pdf" \
            --from gfm \
            --pdf-engine=xelatex \
            --metadata title="Zane Jobe CV"

      - name: Commit updated PDF if changed
        run: |
          if git diff --quiet -- files/Zane_Jobe_CV_2026.pdf; then
            echo "No PDF changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add files/Zane_Jobe_CV_2026.pdf
          git commit -m "Auto-generate CV PDF from cv.md"
          git push

name: Generate CV PDF

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    paths:
      - "_pages/cv.md"
      - "_config.yml"
      - "_data/**"
      - "_includes/**"
      - "assets/**"
      - "index.md"
      - "Gemfile"
      - "scripts/render-cv-pdf.mjs"
      - ".github/workflows/cv-pdf.yml"

permissions:
  contents: write

jobs:
  build-pdf:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build site with Jekyll
        run: bundle exec jekyll build

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Create files directory
        run: mkdir -p files

      - name: Start local server
        run: |
          python3 -m http.server 4001 --directory _site >/tmp/cv-pdf-server.log 2>&1 &
          for attempt in {1..20}; do
            curl --silent --fail "http://127.0.0.1:4001/cv/" >/dev/null && exit 0
            sleep 1
          done
          echo "Timed out waiting for local site server"
          cat /tmp/cv-pdf-server.log
          exit 1

      - name: Generate PDF from rendered CV page
        run: node scripts/render-cv-pdf.mjs "http://127.0.0.1:4001/cv/" "files/Zane_Jobe_CV_2026.pdf"

      - name: Commit updated PDF if changed
        run: |
          if git diff --quiet -- files/Zane_Jobe_CV_2026.pdf; then
            echo "No PDF changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add files/Zane_Jobe_CV_2026.pdf
          git commit -m "Auto-generate CV PDF from cv.md"
          git push
